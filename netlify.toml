[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Next.js SSR için gerekli ayarlar
[functions]
  node_bundler = "esbuild"
  included_files = [".next/**"]

# Cache optimizasyonu
[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Cache headers
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag = "index, follow, max-image-preview:large"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"

# Redirect kuralları (SPA fallback'i devre dışı)
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
  force = false
